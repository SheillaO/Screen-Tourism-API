<!DOCTYPE html>
<html>

<body>
    <h1>Screen Tourism</h1>
    <div id="app"></div>

    <script>
        fetch("https://screen-tourism-api.onrender.com/api")
            .then(res => res.json())
            .then(data => {
                const app = document.getElementById("app");

                data.forEach(item => {
                    const card = document.createElement("div");

                    card.innerHTML = `
              <h2>${item.name}</h2>
              <img src="${item.image}" width="300" />
              <p>${item.country}</p>
            `;

                    app.appendChild(card);
                });
            });
    </script>
</body>

</html>
